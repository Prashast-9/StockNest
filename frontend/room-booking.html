<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Booking — StockNest</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- App Shell: sidebar + main area -->
  <div class="app-shell">

    <!-- Reusable sidebar (injected by components/sidebar.js) -->
    <aside id="sidebar-root" class="app-shell__sidebar"></aside>

    <div class="app-shell__main">
      <!-- Reusable top bar (injected by components/topbar.js) -->
      <div id="topbar-root" class="app-shell__topbar"></div>

      <!-- Page-specific content -->
      <div class="page-layout">
        <main class="page-content" aria-labelledby="page-title">

          <!-- Page header -->
          <header class="page-header">
            <h2 id="page-title" class="page-header__title">Room Booking</h2>
            <p class="page-header__subtitle">Manage workspace allocations and availability.</p>
          </header>

          <!-- Find a Room filter card -->
          <section class="find-room card" aria-labelledby="find-room-title">
            <h3 id="find-room-title" class="find-room__title">Find a Room</h3>

            <form class="find-room__form" id="find-room-form" novalidate>
              <div class="find-room__field">
                <label class="find-room__label" for="booking-date">Date</label>
                <div class="find-room__picker">
                  <svg class="find-room__picker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                  </svg>
                  <input type="date" id="booking-date" class="find-room__picker-input find-room__picker-input--date" />
                </div>
              </div>

              <div class="find-room__field">
                <label class="find-room__label" for="booking-time">Time Start</label>
                <div class="find-room__picker">
                  <svg class="find-room__picker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                  </svg>
                  <input type="time" id="booking-time" class="find-room__picker-input find-room__picker-input--time" value="09:00" />
                </div>
              </div>

              <div class="find-room__field">
                <label class="find-room__label" for="booking-duration">Duration</label>
                <div class="find-room__select-wrap">
                  <select id="booking-duration" class="find-room__select">
                    <option value="30">30 Minutes</option>
                    <option value="60">1 Hour</option>
                    <option value="90">1.5 Hours</option>
                    <option value="120" selected>2 Hours</option>
                    <option value="180">3 Hours</option>
                    <option value="240">4 Hours</option>
                  </select>
                </div>
              </div>

              <div class="find-room__field">
                <label class="find-room__label" for="booking-capacity">Capacity</label>
                <div class="find-room__select-wrap">
                  <select id="booking-capacity" class="find-room__select">
                    <option value="1-3">1 - 3 Ppl</option>
                    <option value="4-8" selected>4 - 8 Ppl</option>
                    <option value="9-12">9 - 12 Ppl</option>
                    <option value="13+">13+ Ppl</option>
                  </select>
                </div>
              </div>
            </form>
          </section>

          <!-- Available Rooms list -->
          <section class="rooms-section" aria-labelledby="rooms-heading">
            <div class="rooms-section__header">
              <h3 id="rooms-heading" class="rooms-section__title">Available Rooms</h3>
              <span class="rooms-section__count" id="rooms-count">2 found</span>
            </div>

            <div class="rooms-list" id="rooms-list" role="list">
              <!-- Room cards rendered by script.js -->
            </div>
          </section>

        </main>

        <!-- My Bookings floating panel -->
        <aside class="my-bookings card" aria-labelledby="my-bookings-title">
          <div class="my-bookings__header">
            <h3 id="my-bookings-title" class="my-bookings__title">📅 My Bookings</h3>
            <button type="button" class="my-bookings__menu-btn" aria-label="Booking options">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
              </svg>
            </button>
          </div>

          <ul class="my-bookings__list" id="bookings-list" role="list">
            <!-- Booking items rendered by script.js -->
          </ul>

          <button type="button" class="my-bookings__view-all" disabled>
            + View Full Schedule
          </button>
        </aside>

      </div>
    </div>
  </div>

  <!-- Booking confirmation modal -->
  <div class="modal" id="booking-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal__backdrop" data-modal-close></div>
    <div class="modal__content">
      <h4 id="modal-title" class="modal__title">Confirm Booking</h4>
      <p class="modal__message" id="modal-message">You are about to book this room.</p>
      <div class="modal__actions">
        <button type="button" class="btn btn--secondary" data-modal-close>Cancel</button>
        <button type="button" class="btn btn--primary" id="modal-confirm">Confirm Booking</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
