<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StockNest — Secure workspace and inventory management for modern teams.">
  <title>Login | StockNest</title>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="login.css">
</head>
<body>

  <main class="login-page" role="main">

    <!-- Left: branding / hero image (hidden below 1024px) -->
    <section class="login-hero" aria-hidden="true">
      <img
        class="login-hero__image"
        src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1600&q=80"
        alt=""
        loading="eager"
        decoding="async"
      >
      <div class="login-hero__overlay"></div>
    </section>

    <!-- Right: login form -->
    <section class="login-panel">
      <div class="login-card">

        <header class="login-card__header">
          <h1 class="login-card__title">StockNest</h1>
          <p class="login-card__subtitle">Empowering Productive Workspaces.</p>
        </header>

        <div id="loginAlert" class="form-alert" style="display: none; margin-bottom: 1.25rem;"></div>

        <form class="login-form" id="loginForm" novalidate>

          <!-- Email or phone -->
          <div class="form-group">
            <label class="form-label" for="emailOrPhone">Email or phone</label>
            <div class="input-wrapper">
              <span class="input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input
                type="text"
                id="emailOrPhone"
                name="emailOrPhone"
                class="form-input"
                placeholder="name@company.com"
                autocomplete="username"
                required
              >
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label" for="password">Password</label>
              <a href="#" class="form-link">Forgot?</a>
            </div>
            <div class="input-wrapper">
              <span class="input-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                class="form-input form-input--password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              >
              <button
                type="button"
                class="password-toggle"
                id="passwordToggle"
                aria-label="Show password"
                aria-pressed="false"
              >
                <!-- Eye (show) icon -->
                <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <!-- Eye-off (hide) icon -->
                <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember me -->
          <div class="form-group form-group--checkbox">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe" name="rememberMe" class="checkbox-input">
              <span class="checkbox-custom" aria-hidden="true"></span>
              <span class="checkbox-text">Remember me</span>
            </label>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary">
            Login to StockNest
            <span class="btn-arrow" aria-hidden="true">→</span>
          </button>

          <!-- OR separator -->
          <div class="or-separator">
            <span class="or-separator__line"></span>
            <span class="or-separator__text">or</span>
            <span class="or-separator__line"></span>
          </div>

          <!-- Google Sign In -->
          <button type="button" id="googleSignInBtn" class="btn-google">
            <svg class="btn-google__icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
            </svg>
            Sign in with Google
          </button>

        </form>

        <hr class="login-divider">

        <p class="login-signup">
          Need an account?
          <a href="#" class="form-link">Contact Administrator</a>
        </p>

        <footer class="login-footer">
          <p class="login-footer__tagline">Secure Workspace Management for Modern Teams</p>
          <div class="status-badge" role="status">
            <span class="status-badge__dot" aria-hidden="true"></span>
            <span class="status-badge__text">SYS: SECURE • V 2.4.1</span>
          </div>
        </footer>

      </div>
    </section>

  </main>

  <!-- Firebase Client SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script src="login.js"></script>
</body>
</html>
